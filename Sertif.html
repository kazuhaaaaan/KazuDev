<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertiFolio - Nouva Prasetya Ardhana</title>
    <link rel="icon" type="image/x-icon" href="./dist/img/logo2.png">
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { dark: { bg: '#020617', card: '#0f172a', border: '#1e293b' } } } }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-effect { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-dark-bg text-slate-900 dark:text-slate-100 min-h-screen transition-all">

    <nav class="sticky top-0 z-40 bg-white/80 dark:bg-dark-card/80 border-b border-slate-200 dark:border-dark-border glass-effect">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2 font-bold text-xl">
                <div class="p-2 bg-indigo-600 rounded-lg text-white"><i data-lucide="award"></i></div>
                Certificates
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" id="theme-toggle">
                    <i data-lucide="moon" class="dark:hidden"></i>
                    <i data-lucide="sun" class="hidden dark:block text-yellow-400"></i>
                </button>
                <div class="h-6 w-px bg-slate-200 dark:bg-dark-border"></div>
                <a href="./index" class="text-sm font-semibold flex items-center gap-1 hover:text-indigo-600 transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali
                </a>
            </div>
        </div>
    </nav>

    <header class="py-16 text-center px-4">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-400 dark:to-purple-400">Koleksi Prestasi & Sertifikat</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto">Dokumentasi perjalanan profesional Nouva Prasetya Ardhana.</p>
    </header>

    <section class="max-w-6xl mx-auto px-4 mb-8">
        <div class="bg-white dark:bg-dark-card p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-dark-border flex flex-col md:flex-row gap-4">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                <input type="text" id="search-input" placeholder="Cari sertifikat..." class="w-full pl-10 pr-4 py-2 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="flex overflow-x-auto gap-2 no-scrollbar" id="category-filters"></div>
        </div>
    </section>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        <div id="achievements-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="empty-state" class="hidden flex flex-col items-center py-20 text-center">
            <div class="w-16 h-16 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-4"><i data-lucide="search-x" class="text-slate-400"></i></div>
            <h3 class="text-xl font-bold">Tidak ditemukan hasil</h3>
        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-dark-card w-full max-w-3xl max-h-[90vh] rounded-3xl overflow-hidden shadow-2xl flex flex-col transition-all duration-300 scale-95 opacity-0" id="modal-content">
            <div class="p-4 flex justify-between items-center border-b border-slate-100 dark:border-dark-border">
                <h2 class="font-bold">Detail Sertifikat</h2>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" class="overflow-y-auto p-6"></div>
        </div>
    </div>

    <footer class="py-10 text-center">
        <p class="text-slate-500 text-sm">&copy; <span id="year"></span> Nouva Prasetya Ardhana - CertiFolio.</p>
    </footer>

    <script>
        const SB_URL = 'https://gnvyjnycgtmbktbcugda.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdudnlqbnljZ3RtYmt0YmN1Z2RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTY2MjcsImV4cCI6MjA5MjQzMjYyN30.tHLospYWjAOIcYwBJBrSqh5GnW1Bt23ecJqrBSlehu8';
        const sbClient = window.supabase.createClient(SB_URL, SB_KEY);

        let achievements = [];
        const categories = ["Semua", "Teknologi", "Bootcamp", "Intern", "Webinar", "Soft Skills"];
        let currentFilter = "Semua";
        let currentSearch = "";

        async function fetchCertificates() {
            const grid = document.getElementById('achievements-grid');
            grid.innerHTML = '<div class="col-span-full text-center py-10 animate-pulse">Menghubungkan ke database...</div>';
            try {
                const { data, error } = await sbClient.from('certificates').select('*').order('date', { ascending: false });
                if (error) throw error;
                achievements = data;
                renderCategories();
                renderAchievements();
            } catch (err) {
                console.error("Fetch Error:", err);
                grid.innerHTML = `<div class="col-span-full text-center text-red-500">Error: ${err.message}</div>`;
            }
        }

        function renderCategories() {
            const container = document.getElementById('category-filters');
            container.innerHTML = categories.map(cat => `
                <button onclick="setCategory('${cat}')" class="px-4 py-2 rounded-xl text-sm font-medium transition-all ${currentFilter === cat ? 'bg-indigo-600 text-white' : 'bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700'}">
                    ${cat}
                </button>
            `).join('');
        }

        function setCategory(cat) {
            currentFilter = cat;
            renderCategories();
            renderAchievements();
        }

        function renderAchievements() {
            const grid = document.getElementById('achievements-grid');
            const empty = document.getElementById('empty-state');
            const filtered = achievements.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(currentSearch) || item.issuer.toLowerCase().includes(currentSearch);
                const matchesCat = currentFilter === "Semua" || item.category === currentFilter;
                return matchesSearch && matchesCat;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                grid.innerHTML = filtered.map(item => `
                    <div class="bg-white dark:bg-dark-card rounded-2xl overflow-hidden border border-slate-200 dark:border-dark-border shadow-sm hover:shadow-xl transition-all cursor-pointer group" onclick="openModal('${item.id}')">
                        <div class="aspect-video overflow-hidden bg-slate-100">
                            <img src="${item.image_url}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/400x225?text=Gambar+Error'">
                        </div>
                        <div class="p-5">
                            <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">${item.category}</span>
                            <h3 class="font-bold text-lg mb-1 line-clamp-1 group-hover:text-indigo-600 transition-colors">${item.title}</h3>
                            <p class="text-xs text-slate-500 italic">${item.issuer}</p>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            }
        }

        function openModal(id) {
            const item = achievements.find(a => a.id === id);
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            const body = document.getElementById('modal-body');

            body.innerHTML = `
                <img src="${item.image_url}" class="w-full rounded-xl mb-6 shadow-lg border dark:border-dark-border">
                <div class="space-y-4">
                    <div>
                        <h2 class="text-2xl font-bold">${item.title}</h2>
                        <p class="text-indigo-600 font-medium">${item.issuer}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 py-4 border-y border-slate-100 dark:border-dark-border">
                        <div><p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Tanggal</p><p class="text-sm font-semibold">${item.date}</p></div>
                        <div><p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">ID Kredensial</p><p class="font-mono text-xs break-all bg-slate-50 dark:bg-slate-800 p-1 rounded">${item.credential_id || '-'}</p></div>
                    </div>
                    <div class="mt-4">
                        <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed">${item.description}</p>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            setTimeout(() => content.classList.remove('scale-95', 'opacity-0'), 10);
            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // 2. Perbaikan fungsi Toggle agar menyimpan ke localStorage
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderAchievements();
        });

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        window.onload = () => {
            document.getElementById('year').innerText = new Date().getFullYear();
            lucide.createIcons();
            fetchCertificates();
        };
    </script>
</body>
</html>
