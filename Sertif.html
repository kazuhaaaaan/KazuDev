<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertiFolio - Nouva Prasetya Ardhana</title>
    <link rel="icon" type="image/x-icon" href="./dist/img/logo2.png">
    <link rel="stylesheet" href="./css/style.css">
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { dark: { bg: '#020617', card: '#0f172a', border: '#1e293b' } } } }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-dark-bg text-slate-900 dark:text-slate-100 min-h-screen transition-all">

    <nav class="sticky top-0 z-40 bg-white/80 dark:bg-dark-card/80 border-b border-slate-200 dark:border-dark-border glass-effect">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2 font-bold text-xl">
                <div class="p-2 bg-indigo-600 rounded-lg text-white"><i data-lucide="award"></i></div>
                Certificates
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" id="theme-toggle">
                    <i data-lucide="moon" class="dark:hidden"></i>
                    <i data-lucide="sun" class="hidden dark:block text-yellow-400"></i>
                </button>
                <div class="h-6 w-px bg-slate-200 dark:bg-dark-border"></div>
                <a href="./index" class="text-sm font-semibold flex items-center gap-1 hover:text-indigo-600 transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali
                </a>
            </div>
        </div>
    </nav>

    <header class="py-16 text-center px-4">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-400 dark:to-purple-400">Koleksi Prestasi & Sertifikat</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto">Dokumentasi perjalanan profesional Nouva Prasetya Ardhana.</p>
    </header>

    <section class="max-w-6xl mx-auto px-4 mb-8">
        <div class="bg-white dark:bg-dark-card p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-dark-border flex flex-col md:flex-row gap-4">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                <input type="text" id="search-input" placeholder="Cari sertifikat..." class="w-full pl-10 pr-4 py-2 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="flex overflow-x-auto gap-2 no-scrollbar" id="category-filters"></div>
        </div>
    </section>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        <div id="achievements-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="empty-state" class="hidden flex flex-col items-center py-20 text-center">
            <div class="w-16 h-16 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-4"><i data-lucide="search-x" class="text-slate-400"></i></div>
            <h3 class="text-xl font-bold">Tidak ditemukan hasil</h3>
        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-dark-card w-full max-w-3xl max-h-[90vh] rounded-3xl overflow-hidden shadow-2xl flex flex-col transition-all duration-300 scale-95 opacity-0" id="modal-content">
            <div class="p-4 flex justify-between items-center border-b border-slate-100 dark:border-dark-border">
                <h2 class="font-bold">Detail Sertifikat</h2>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" class="overflow-y-auto p-6"></div>
        </div>
    </div>

    <footer class="py-10 text-center">
        <p class="text-slate-500 text-sm">&copy; <span id="year"></span> Nouva Prasetya Ardhana - CertiFolio.</p>
    </footer>

    <script src="./js/sertif.js"></script>
</body>
</html>
