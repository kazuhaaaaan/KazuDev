<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin CMS - CertiFolio</title>
    <link rel="icon" type="image/x-icon" href="./dist/img/logo2.png">
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { dark: { bg: '#020617', card: '#0f172a', border: '#1e293b' } }
                }
            }
        }
    </script>
    <style>
        /* Sembunyikan halaman sampai auth terverifikasi */
        body { opacity: 0; transition: opacity 0.5s; }
        body.auth-ready { opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-dark-bg text-slate-900 dark:text-slate-100 min-h-screen p-4 md:p-10 font-sans transition-all duration-300">

    <div class="max-w-2xl mx-auto">
        <header class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Admin CMS</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Kelola sertifikat Nouva Prasetya Ardhana</p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleDarkMode()" class="p-2 rounded-xl bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <i data-lucide="moon" class="dark:hidden w-5 h-5 text-slate-600"></i>
                    <i data-lucide="sun" class="hidden dark:block w-5 h-5 text-yellow-400"></i>
                </button>
                <button onclick="handleLogout()" class="p-2 px-3 text-red-500 font-bold text-xs bg-red-50 dark:bg-red-900/10 rounded-xl hover:bg-red-500 hover:text-white transition-all flex items-center gap-1">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                </button>
            </div>
        </header>

        <section class="mb-12">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i data-lucide="file-text" class="text-indigo-600"></i> Update File CV
            </h2>
            <form id="cv-upload-form" class="bg-white dark:bg-dark-card p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-dark-border flex flex-col md:flex-row items-center gap-4">
                <div class="w-full flex-1">
                    <input type="file" id="cv-file-input" accept=".pdf" required class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:font-bold file:bg-indigo-50 dark:file:bg-indigo-900/20 file:text-indigo-700 dark:file:text-indigo-300 hover:file:bg-indigo-100 cursor-pointer transition-all">
                    <p id="current-cv-status" class="text-xs text-slate-400 mt-2 ml-1">Status: Memeriksa file CV saat ini...</p>
                </div>
                <button type="submit" id="cv-submit-btn" class="w-full md:w-auto whitespace-nowrap bg-indigo-600 text-white px-6 py-2 rounded-2xl font-bold hover:bg-indigo-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    <i data-lucide="upload-cloud" class="w-5 h-5"></i> Update CV
                </button>
            </form>
        </section>

        <section class="mb-12">
            <div class="flex justify-between items-center mb-4">
                <h2 id="form-title" class="text-lg font-bold flex items-center gap-2">
                    <i data-lucide="plus-circle" class="text-indigo-600"></i> Tambah Baru
                </h2>
                <button id="cancel-edit" onclick="resetForm()" class="hidden text-xs text-red-500 font-bold hover:underline flex items-center gap-1">
                    <i data-lucide="x-circle" class="w-3 h-3"></i> Batal Edit
                </button>
            </div>
            
            <form id="certificate-form" class="bg-white dark:bg-dark-card p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-dark-border space-y-5">
                <input type="hidden" id="edit-id">
                <input type="hidden" id="old-image-url">

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-70">Judul Sertifikat</label>
                        <input type="text" id="title" placeholder="Contoh: MTCNA Certification" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-1 opacity-70">Penerbit</label>
                            <input type="text" id="issuer" placeholder="Instansi..." required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1 opacity-70">Tanggal</label>
                            <input type="date" id="date" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-70">Kategori</label>
                        <select id="category" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                            <option value="Teknologi">Teknologi</option>
                            <option value="Bootcamp">Bootcamp</option>
                            <option value="Intern">Intern</option>
                            <option value="Webinar">Webinar</option>
                            <option value="Soft Skills">Soft Skills</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-70">ID Kredensial</label>
                        <input type="text" id="credential_id" placeholder="-" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-mono">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-70">Deskripsi</label>
                        <textarea id="description" rows="3" placeholder="Detail..." class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"></textarea>
                    </div>

                    <div class="p-4 bg-indigo-50/50 dark:bg-indigo-900/10 rounded-2xl border-2 border-dashed border-indigo-200 dark:border-indigo-800/40">
                        <label class="block text-sm font-bold text-indigo-700 dark:text-indigo-400 mb-2 text-center">Gambar Sertifikat</label>
                        <input type="file" id="image-file" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-indigo-600 file:text-white cursor-pointer transition-all">
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-lg shadow-indigo-200 dark:shadow-none flex items-center justify-center gap-2 text-lg">
                    <i data-lucide="save" class="w-5 h-5"></i> <span>Simpan Sertifikat</span>
                </button>
            </form>
        </section>

        <section>
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="layers" class="text-indigo-600"></i> Kelola Data</h2>
            <div id="admin-list" class="grid grid-cols-1 gap-4 pb-20"></div>
        </section>
    </div>

    <script>
        // --- 1. KONFIGURASI SUPABASE ---
        const SB_URL = 'https://gnvyjnycgtmbktbcugda.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdudnlqbnljZ3RtYmt0YmN1Z2RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTY2MjcsImV4cCI6MjA5MjQzMjYyN30.tHLospYWjAOIcYwBJBrSqh5GnW1Bt23ecJqrBSlehu8';
        const sbAdmin = window.supabase.createClient(SB_URL, SB_KEY);

        const form = document.getElementById('certificate-form');
        const submitBtn = document.getElementById('submit-btn');

        // --- 2. PROTEKSI HALAMAN (SECURITY GATE) ---
        async function checkAuth() {
            const { data: { session } } = await sbAdmin.auth.getSession();
            if (!session) {
                window.location.href = 'login';
            } else {
                document.body.classList.add('auth-ready');
                loadAdminList();
                checkCurrentCV(); // Panggil fungsi cek CV
            }
        }

        // --- Tambahan: FITUR UPLOAD CV ---
        const cvForm = document.getElementById('cv-upload-form');
        const cvSubmitBtn = document.getElementById('cv-submit-btn');
        const cvStatusText = document.getElementById('current-cv-status');

        async function checkCurrentCV() {
            const { data } = await sbAdmin.from('site_settings').select('value').eq('key', 'cv_url').single();
            if (data && data.value && data.value !== '#') {
                cvStatusText.innerHTML = `<a href="${data.value}" target="_blank" class="text-indigo-500 hover:underline">Lihat CV saat ini</a>`;
            } else {
                cvStatusText.textContent = "Belum ada file CV yang diupload.";
            }
        }

        cvForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            cvSubmitBtn.disabled = true;
            cvSubmitBtn.innerHTML = `<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> <span>...</span>`;

            const file = document.getElementById('cv-file-input').files[0];

            try {
                if (!file) throw new Error("Pilih file PDF terlebih dahulu!");

                // 1. Upload ke Storage Bucket "cv_files"
                const cleanFileName = `CV_Nouva_Prasetya_${Date.now()}.pdf`;
                const { error: storageError } = await sbAdmin.storage.from('cv_files').upload(cleanFileName, file);
                if (storageError) throw storageError;

                // 2. Dapatkan Link Publik
                const { data: urlData } = sbAdmin.storage.from('cv_files').getPublicUrl(cleanFileName);
                const publicCVUrl = urlData.publicUrl;

                // 3. Simpan link ke tabel "site_settings"
                const { error: dbError } = await sbAdmin.from('site_settings').update({ value: publicCVUrl }).eq('key', 'cv_url');
                if (dbError) throw dbError;

                alert('File CV berhasil diupdate!');
                cvForm.reset();
                checkCurrentCV(); // Refresh status
                
            } catch (err) {
                alert('Gagal mengupload CV: ' + err.message);
            } finally {
                cvSubmitBtn.disabled = false;
                cvSubmitBtn.innerHTML = `<i data-lucide="upload-cloud" class="w-5 h-5"></i> Update CV`;
                lucide.createIcons();
            }
        });


        // --- 3. FITUR SIMPAN & UPDATE ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const oldImgUrl = document.getElementById('old-image-url').value;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Memproses...`;

            const file = document.getElementById('image-file').files[0];
            const payload = {
                title: document.getElementById('title').value,
                issuer: document.getElementById('issuer').value,
                date: document.getElementById('date').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                credential_id: document.getElementById('credential_id').value || '-'
            };

            try {
                if (file) {
                    const cleanFileName = `${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
                    const { error: storageError } = await sbAdmin.storage.from('certificates').upload(cleanFileName, file);
                    if (storageError) throw storageError;

                    const { data: urlData } = sbAdmin.storage.from('certificates').getPublicUrl(cleanFileName);
                    payload.image_url = urlData.publicUrl;
                } else if (editId) {
                    payload.image_url = oldImgUrl;
                } else {
                    throw new Error("Pilih gambar terlebih dahulu!");
                }

                if (editId) {
                    const { error } = await sbAdmin.from('certificates').update(payload).eq('id', editId);
                    if (error) throw error;
                    alert('Berhasil diperbarui!');
                } else {
                    const { error } = await sbAdmin.from('certificates').insert([payload]);
                    if (error) throw error;
                    alert('Berhasil disimpan!');
                }

                resetForm();
                loadAdminList();
            } catch (err) {
                alert('Gagal: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                resetFormUI();
            }
        });

        // --- 4. LOAD DAFTAR SERTIFIKAT ---
        async function loadAdminList() {
            const listContainer = document.getElementById('admin-list');
            listContainer.innerHTML = '<p class="text-center py-10 opacity-50">Memuat data...</p>';
            
            const { data, error } = await sbAdmin.from('certificates').select('*').order('date', { ascending: false });
            if (error) return listContainer.innerHTML = 'Error database.';

            if (data.length === 0) {
                listContainer.innerHTML = '<p class="text-center py-10 opacity-30 italic">Belum ada data.</p>';
                return;
            }

            listContainer.innerHTML = data.map(item => `
                <div class="flex items-center justify-between bg-white dark:bg-dark-card p-4 rounded-2xl border border-slate-200 dark:border-dark-border shadow-sm">
                    <div class="flex items-center gap-4 overflow-hidden">
                        <img src="${item.image_url}" class="w-12 h-12 rounded-xl object-cover border dark:border-slate-800 flex-shrink-0" onerror="this.src='https://via.placeholder.com/100'">
                        <div class="overflow-hidden">
                            <p class="font-bold truncate text-sm">${item.title}</p>
                            <p class="opacity-60 text-[10px] uppercase tracking-widest font-bold text-indigo-600">${item.category}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="prepareEdit('${encodeURIComponent(JSON.stringify(item))}')" class="p-2 text-indigo-600 bg-indigo-50 dark:bg-indigo-900/20 rounded-lg hover:bg-indigo-600 hover:text-white transition-all">
                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                        </button>
                        <button onclick="deleteCertificate('${item.id}', '${item.image_url}')" class="p-2 text-red-500 bg-red-50 dark:bg-red-900/20 rounded-lg hover:bg-red-600 hover:text-white transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- 5. FUNGSI EDIT, DELETE & LOGOUT ---
        function prepareEdit(jsonItem) {
            const item = JSON.parse(decodeURIComponent(jsonItem));
            document.getElementById('edit-id').value = item.id;
            document.getElementById('old-image-url').value = item.image_url;
            document.getElementById('title').value = item.title;
            document.getElementById('issuer').value = item.issuer;
            document.getElementById('date').value = item.date;
            document.getElementById('category').value = item.category;
            document.getElementById('description').value = item.description;
            document.getElementById('credential_id').value = item.credential_id;

            document.getElementById('form-title').innerHTML = `<i data-lucide="edit-3" class="text-orange-500"></i> Mode Edit`;
            document.getElementById('cancel-edit').classList.remove('hidden');
            document.getElementById('image-file').required = false; 
            submitBtn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i> <span>Perbarui Sertifikat</span>`;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            lucide.createIcons();
        }

        function resetForm() {
            form.reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('old-image-url').value = "";
            resetFormUI();
        }

        function resetFormUI() {
            document.getElementById('form-title').innerHTML = `<i data-lucide="plus-circle" class="text-indigo-600"></i> Tambah Baru`;
            document.getElementById('cancel-edit').classList.add('hidden');
            document.getElementById('image-file').required = true;
            submitBtn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i> <span>Simpan Sertifikat</span>`;
            lucide.createIcons();
        }

        async function deleteCertificate(id, imageUrl) {
            if (!confirm('Hapus sertifikat ini secara permanen?')) return;
            try {
                const fileName = imageUrl.split('/').pop();
                await sbAdmin.storage.from('certificates').remove([fileName]);
                await sbAdmin.from('certificates').delete().eq('id', id);
                loadAdminList();
            } catch (err) { alert('Hapus gagal: ' + err.message); }
        }

        async function handleLogout() {
            if (confirm('Keluar dari panel admin?')) {
                await sbAdmin.auth.signOut();
                window.location.href = 'login';
            }
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
        }

        // Jalankan Pengecekan Auth saat halaman dibuka
        checkAuth();
        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
