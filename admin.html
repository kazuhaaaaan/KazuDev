<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin CMS - CertiFolio</title>
    <link rel="icon" type="image/x-icon" href="./dist/img/logo2.png">
    <link rel="stylesheet" href="./css/style.css">
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { dark: { bg: '#020617', card: '#0f172a', border: '#1e293b' } }
                }
            }
        }
    </script>

</head>
<body class="bg-slate-50 dark:bg-dark-bg text-slate-900 dark:text-slate-100 min-h-screen p-4 md:p-10 font-sans transition-all duration-300">

    <div class="max-w-2xl mx-auto">
        <header class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Admin CMS</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Kelola sertifikat Nouva Prasetya Ardhana</p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleDarkMode()" class="p-2 rounded-xl bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <i data-lucide="moon" class="dark:hidden w-5 h-5 text-slate-600"></i>
                    <i data-lucide="sun" class="hidden dark:block w-5 h-5 text-yellow-400"></i>
                </button>
                <button onclick="handleLogout()" class="p-2 px-3 text-red-500 font-bold text-xs bg-red-50 dark:bg-red-900/10 rounded-xl hover:bg-red-500 hover:text-white transition-all flex items-center gap-1">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                </button>
            </div>
        </header>

        <section class="mb-12">
            <div class="flex justify-between items-center mb-4">
                <h2 id="form-title" class="text-lg font-bold flex items-center gap-2">
                    <i data-lucide="plus-circle" class="text-indigo-600"></i> Tambah Baru
                </h2>
                <button id="cancel-edit" onclick="resetForm()" class="hidden text-xs text-red-500 font-bold hover:underline flex items-center gap-1">
                    <i data-lucide="x-circle" class="w-3 h-3"></i> Batal Edit
                </button>
            </div>
            
            <form id="certificate-form" class="bg-white dark:bg-dark-card p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-dark-border space-y-5">
                <input type="hidden" id="edit-id">
                <input type="hidden" id="old-image-url">

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-70">Judul Sertifikat</label>
                        <input type="text" id="title" placeholder="Contoh: MTCNA Certification" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-1 opacity-70">Penerbit</label>
                            <input type="text" id="issuer" placeholder="Instansi..." required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1 opacity-70">Tanggal</label>
                            <input type="date" id="date" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-70">Kategori</label>
                        <select id="category" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                            <option value="Teknologi">Teknologi</option>
                            <option value="Bootcamp">Bootcamp</option>
                            <option value="Intern">Intern</option>
                            <option value="Webinar">Webinar</option>
                            <option value="Soft Skills">Soft Skills</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-70">ID Kredensial</label>
                        <input type="text" id="credential_id" placeholder="-" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-mono">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-70">Deskripsi</label>
                        <textarea id="description" rows="3" placeholder="Detail..." class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"></textarea>
                    </div>

                    <div class="p-4 bg-indigo-50/50 dark:bg-indigo-900/10 rounded-2xl border-2 border-dashed border-indigo-200 dark:border-indigo-800/40">
                        <label class="block text-sm font-bold text-indigo-700 dark:text-indigo-400 mb-2 text-center">Gambar Sertifikat</label>
                        <input type="file" id="image-file" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-indigo-600 file:text-white cursor-pointer transition-all">
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-lg shadow-indigo-200 dark:shadow-none flex items-center justify-center gap-2 text-lg">
                    <i data-lucide="save" class="w-5 h-5"></i> <span>Simpan Sertifikat</span>
                </button>
            </form>
        </section>

        <section>
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="layers" class="text-indigo-600"></i> Kelola Data</h2>
            <div id="admin-list" class="grid grid-cols-1 gap-4 pb-20"></div>
        </section>
    </div>

    <script src="./js/admin.js">
    </script>
</body>
</html>
