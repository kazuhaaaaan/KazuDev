<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin CMS - CertiFolio</title>
    <link rel="icon" type="image/x-icon" href="./dist/img/logo2.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 
                            bg: '#020617', 
                            card: '#0f172a', 
                            border: '#1e293b' 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .transition-theme { transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-dark-bg text-slate-900 dark:text-slate-100 min-h-screen p-4 md:p-10 font-sans transition-theme">

    <div class="max-w-2xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Admin Panel</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Manajemen Sertifikat Nouva Prasetya Ardhana</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleDarkMode()" class="p-2 rounded-xl bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border shadow-sm hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <i data-lucide="moon" class="dark:hidden w-5 h-5 text-slate-600"></i>
                    <i data-lucide="sun" class="hidden dark:block w-5 h-5 text-yellow-400"></i>
                </button>
                <a href="Sertif.html" class="p-2 px-4 bg-indigo-600 text-white text-sm font-bold rounded-xl hover:bg-indigo-700 transition-all flex items-center gap-2 shadow-lg shadow-indigo-200 dark:shadow-none">
                    <i data-lucide="external-link" class="w-4 h-4"></i> Lihat Web
                </a>
            </div>
        </div>

        <section class="mb-12">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="plus-circle" class="text-indigo-600"></i> Tambah Baru</h2>
            <form id="certificate-form" class="bg-white dark:bg-dark-card p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-dark-border space-y-5 transition-theme">
                
                <div>
                    <label class="block text-sm font-bold mb-1.5 opacity-80">Judul Sertifikat</label>
                    <input type="text" id="title" placeholder="Masukkan judul..." required 
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold mb-1.5 opacity-80">Penerbit</label>
                        <input type="text" id="issuer" placeholder="Instansi..." required 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1.5 opacity-80">Tanggal</label>
                        <input type="date" id="date" required 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-1.5 opacity-80">Kategori</label>
                    <select id="category" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        <option value="Teknologi">Teknologi</option>
                        <option value="Bootcamp">Bootcamp</option>
                        <option value="Intern">Intern</option>
                        <option value="Webinar">Webinar</option>
                        <option value="Soft Skills">Soft Skills</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-1.5 opacity-80">ID Kredensial</label>
                    <input type="text" id="credential_id" placeholder="-" 
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-bold mb-1.5 opacity-80">Deskripsi</label>
                    <textarea id="description" rows="3" placeholder="Detail..." 
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"></textarea>
                </div>

                <div class="p-4 bg-indigo-50/50 dark:bg-indigo-900/10 rounded-2xl border-2 border-dashed border-indigo-200 dark:border-indigo-900/30 text-center">
                    <label class="block text-sm font-bold text-indigo-700 dark:text-indigo-400 mb-2">Pilih File Gambar</label>
                    <input type="file" id="image-file" accept="image/*" required 
                        class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 cursor-pointer">
                </div>

                <button type="submit" id="submit-btn" 
                    class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-lg shadow-indigo-200 dark:shadow-none flex items-center justify-center gap-2 text-lg">
                    <i data-lucide="save" class="w-5 h-5"></i> Simpan Sertifikat
                </button>
            </form>
        </section>

        <section>
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="layers" class="text-indigo-600"></i> Kelola Data</h2>
            <div id="admin-list" class="grid grid-cols-1 gap-4">
                </div>
        </section>
    </div>

    <script>
        // --- 1. Konfigurasi Supabase ---
        const SUPABASE_URL = 'https://gnvyjnycgtmbktbcugda.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdudnlqbnljZ3RtYmt0YmN1Z2RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTY2MjcsImV4cCI6MjA5MjQzMjYyN30.tHLospYWjAOIcYwBJBrSqh5GnW1Bt23ecJqrBSlehu8';
        const sbAdmin = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('certificate-form');
        const submitBtn = document.getElementById('submit-btn');

        // --- 2. Fitur Simpan Data ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Menyimpan...`;

            const file = document.getElementById('image-file').files[0];
            const title = document.getElementById('title').value;
            const issuer = document.getElementById('issuer').value;
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;
            const credential_id = document.getElementById('credential_id').value;

            try {
                const cleanFileName = `${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
                
                const { data: storageData, error: storageError } = await sbAdmin.storage
                    .from('certificates') 
                    .upload(cleanFileName, file);

                if (storageError) throw storageError;

                const { data: urlData } = sbAdmin.storage.from('certificates').getPublicUrl(cleanFileName);
                const finalImageUrl = urlData.publicUrl;

                const { error: dbError } = await sbAdmin.from('certificates').insert([{
                    title, issuer, date, category, description,
                    credential_id: credential_id || '-',
                    image_url: finalImageUrl
                }]);

                if (dbError) throw dbError;

                alert('Sertifikat berhasil masuk database!');
                form.reset();
                loadAdminList();

            } catch (err) {
                alert('Gagal: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i> Simpan Sertifikat`;
                lucide.createIcons();
            }
        });

        // --- 3. Fitur Load & Kelola Data ---
        async function loadAdminList() {
            const listContainer = document.getElementById('admin-list');
            listContainer.innerHTML = '<p class="text-center py-10 opacity-50">Memuat daftar sertifikat...</p>';

            const { data, error } = await sbAdmin.from('certificates').select('*').order('date', { ascending: false });

            if (error) {
                listContainer.innerHTML = `<p class="text-red-500 text-center">Gagal muat data: ${error.message}</p>`;
                return;
            }

            if (data.length === 0) {
                listContainer.innerHTML = '<p class="text-center py-10 opacity-40">Belum ada data tersimpan.</p>';
                return;
            }

            listContainer.innerHTML = data.map(item => `
                <div class="flex items-center justify-between bg-white dark:bg-dark-card p-4 rounded-2xl border border-slate-200 dark:border-dark-border shadow-sm transition-theme">
                    <div class="flex items-center gap-4 overflow-hidden">
                        <img src="${item.image_url}" class="w-14 h-14 rounded-xl object-cover border dark:border-slate-700 flex-shrink-0" onerror="this.src='https://via.placeholder.com/100'">
                        <div class="overflow-hidden text-sm">
                            <p class="font-bold truncate text-slate-800 dark:text-slate-100">${item.title}</p>
                            <p class="opacity-60 truncate text-xs">${item.issuer} • ${item.category}</p>
                        </div>
                    </div>
                    <button onclick="deleteCertificate('${item.id}', '${item.image_url}')" 
                        class="p-3 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-all" title="Hapus">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function deleteCertificate(id, imageUrl) {
            if (!confirm('Yakin mau hapus sertifikat ini?')) return;

            try {
                const fileName = imageUrl.split('/').pop();
                
                // Hapus di Storage dulu
                await sbAdmin.storage.from('certificates').remove([fileName]);

                // Hapus di Database
                const { error } = await sbAdmin.from('certificates').delete().eq('id', id);
                if (error) throw error;

                alert('Terhapus!');
                loadAdminList();
            } catch (err) {
                alert('Gagal hapus: ' + err.message);
            }
        }

        // --- 4. Fungsi Tema & Inisialisasi ---
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        window.onload = () => {
            // Cek Tema
            if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            lucide.createIcons();
            loadAdminList();
        };
    </script>
</body>
</html>
