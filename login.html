<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - CertiFolio</title>
    <link rel="icon" type="image/x-icon" href="./dist/img/logo2.png">
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { dark: { bg: '#020617', card: '#0f172a', border: '#1e293b' } }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-dark-bg text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 transition-all duration-300">

    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-dark-card p-8 rounded-[2.5rem] shadow-2xl border border-slate-200 dark:border-dark-border relative overflow-hidden">
            
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-600/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-purple-600/10 rounded-full blur-3xl"></div>

            <div class="text-center mb-10 relative">
                <div class="inline-flex p-4 bg-indigo-600 rounded-3xl text-white shadow-lg shadow-indigo-200 dark:shadow-none mb-4">
                    <i data-lucide="shield-check" class="w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight">Admin Gate</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Masuk untuk mengelola prestasi Nouva</p>
            </div>

            <form id="login-form" class="space-y-6 relative">
                <div>
                    <label class="block text-sm font-bold mb-2 ml-1 opacity-80">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="email" id="email" placeholder="admin@email.com" required 
                            class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 ml-1 opacity-80">Password</label>
                    <div class="relative">
                        <i data-lucide="key-round" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="password" id="password" placeholder="••••••••" required 
                            class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>
                </div>

                <button type="submit" id="login-btn" 
                    class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-xl shadow-indigo-200 dark:shadow-none flex items-center justify-center gap-3 text-lg">
                    <i data-lucide="log-in" class="w-5 h-5"></i> Masuk Sekarang
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
                <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-indigo-600 transition-colors inline-flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali ke Beranda
                </a>
            </div>
        </div>

        <p class="text-center mt-8 text-xs text-slate-400 font-medium tracking-widest uppercase">
            &copy; 2026 Nouva Prasetya Ardhana
        </p>
    </div>

    <script>
        // --- 1. Konfigurasi Supabase ---
        const SUPABASE_URL = 'https://gnvyjnycgtmbktbcugda.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdudnlqbnljZ3RtYmt0YmN1Z2RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTY2MjcsImV4cCI6MjA5MjQzMjYyN30.tHLospYWjAOIcYwBJBrSqh5GnW1Bt23ecJqrBSlehu8';
        const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');

        // --- 2. Cek Jika Sudah Login ---
        async function checkSession() {
            const { data } = await sbClient.auth.getSession();
            if (data.session) {
                window.location.href = 'admin.html'; // Kalau sudah login, langsung lempar ke admin
            }
        }
        checkSession();

        // --- 3. Proses Login ---
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI State
            loginBtn.disabled = true;
            loginBtn.innerHTML = `<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Mengecek...`;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await sbClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                // Login Berhasil
                window.location.href = 'admin.html';

            } catch (err) {
                alert('Waduh Gagal: ' + err.message);
                loginBtn.disabled = false;
                loginBtn.innerHTML = `<i data-lucide="log-in" class="w-5 h-5"></i> Masuk Sekarang`;
                lucide.createIcons();
            }
        });

        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
